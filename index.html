<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Boss Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="boss-area">
            <h2 id="boss-name">Maestro del Entropía</h2>
            <div class="health-bar-container">
                <div id="boss-health-fill" class="health-fill"></div>
            </div>
            <p>HP: <span id="boss-hp-text">500</span>/500</p>
            <div id="boss-sprite">👾</div> </div>

        <div id="battle-log">¡Un enemigo poderoso aparece! Selecciona tu ataque.</div>

        <div id="player-area">
            <div class="health-bar-container">
                <div id="player-health-fill" class="health-fill player-hp"></div>
            </div>
            <p>Tu HP: <span id="player-hp-text">100</span>/100</p>
            
            <div id="question-container" class="hidden">
                <p id="question-text"></p>
                <div id="options-container"></div>
            </div>

            <div id="actions-container">
                <button onclick="prepararAtaque('facil')">Ataque Leve (Fácil)</button>
                <button onclick="prepararAtaque('medio')">Ataque Potente (Medio)</button>
                <button onclick="prepararAtaque('fuerte')">Carga Máxima (Difícil)</button>
                <button onclick="prepararAtaque('curacion')" class="heal-btn">Reparación (Teoría)</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
